<div class="layout-topbar flex items-center justify-between w-full px-4">
  <div class="flex items-center gap-3 min-w-0">
    <a routerLink="/" class="topbar-logo shrink-0">
      <span class="topbar-logo-text">Nerd* Dashboard</span>
    </a>
    <ng-container *ngIf="info$ | async as info">
      <span class="topbar-hostname text-sm text-gray-600 truncate" pTooltip="Hostname" tooltipPosition="bottom">{{ info.hostname }}</span>
    </ng-container>
  </div>

  <div class="flex items-center gap-0 shrink-0">
    <ng-container *ngIf="info$ | async as info">
      <ul *ngIf="!isAPMode" class="topbar-actions flex items-center list-none m-0 p-0">
        <li>
          <a class="topbar-icon" pTooltip="Sensitive data {{ sensitiveDataHidden ? 'hidden' : 'visible' }}" tooltipPosition="bottom" (click)="toggleSensitiveData()">
            <i class="pi pi-{{ sensitiveDataHidden ? 'eye-slash' : 'eye' }}"></i>
          </a>
        </li>
        <li>
          <a routerLink="network" class="topbar-icon" pTooltip="Wi-Fi RSSI: {{ info.wifiRSSI }} dBm" tooltipPosition="bottom">
            <wifi-icon [rssi]="info.wifiRSSI"></wifi-icon>
          </a>
        </li>
        <li>
          <a class="topbar-icon" pTooltip="Restart" tooltipPosition="bottom" (click)="restart()">
            <i class="pi pi-refresh"></i>
          </a>
        </li>
      </ul>
    </ng-container>
    <button *ngIf="!isAPMode" #menubutton class="layout-topbar-button" (click)="layoutService.onMenuToggle()">
      <i class="pi pi-bars"></i>
    </button>
  </div>
</div>
